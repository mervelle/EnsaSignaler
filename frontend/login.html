<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - EnsaSignaler</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="form.css">
    <style>
        .login-card { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .role-btn { display: block; width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 1.1em; transition: 0.3s; }
        .student-btn:hover { border-color: #22c55e; color: #22c55e; background: #f0fdf4; }
        .admin-btn { background: #1f2937; color: white; border: none; }
        .admin-btn:hover { background: #374151; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: #166534; margin-bottom: 20px;">Ensa Signaler</h2>
        <p>Choisissez votre espace de connexion :</p>
        
        <button class="role-btn student-btn" onclick="setRole('student', 1)">Accès Étudiant</button>
        <button class="role-btn admin-btn" onclick="setRole('admin', 99)">Accès Administration</button>
    </div>

    <script>
        function setRole(role, id) {
            localStorage.setItem('user_role', role);
            localStorage.setItem('user_id', id); // ID générique pour les tests
            
            if(role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'incidents.html';
            }
        }
    </script>
</body>
</html>
